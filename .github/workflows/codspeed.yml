name: Benchmarks

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build benchmarks (${{ matrix.mode }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        mode: [walltime, memory]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed
      - run: cargo codspeed build -p starship-bench -m ${{ matrix.mode }}
      - uses: actions/upload-artifact@v7
        with:
          name: codspeed-${{ matrix.mode }}
          path: target/codspeed
          if-no-files-found: error
          retention-days: 1

  run:
    name: Run benchmarks (${{ matrix.mode }})
    needs: build
    strategy:
      matrix:
        include:
          - mode: walltime
            runner: codspeed-macro
          - mode: memory
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: codspeed-${{ matrix.mode }}
          path: target/codspeed
      - run: find target/codspeed -type f -exec chmod +x {} +
      - uses: CodSpeedHQ/action@v4
        with:
          mode: ${{ matrix.mode }}
          run: cargo codspeed run
